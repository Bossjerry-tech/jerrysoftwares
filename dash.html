<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <link rel="stylesheet" href="dash.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

  
<div class="dashboard">


<!------mobile overlay-------->
<div class="mobile-overlay" id="mobileOverlay"></div>


<!-----header------>
<header class="header">
 <div class="header-left">
  <button class="mobile-toggle" id="menuToggle">
    <i class="fas fa-bars"></i>
  </button>

  <div class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" placeholder="search...">
  </div>

 </div>
<div class="header-right"></div>

</header>



<!-------sidebar------->

<aside class="sidebar" id="sidebar">
  <ul>
<li><a href="">Dashboard</a></li>
<li><a href="">Projects</a></li>
<li><a href="">Tasks</a></li>
<li><a href="">Blogs</a></li>
<li><a href="">Transcript</a></li>
<li><a href="">Reports</a></li>
<li><a href="">Calendar</a></li>
<li><a href="">Settings</a></li>
</ul>
</aside>


<!------main content-->

<main class="content">

<!---welcome banner-->
<div class="welcome-banner">

<h1>Welcome back, Jerry!</h1>
<p>You have 3 ongoing projects. 2 deadlines are approaching this week</p>
<button class="btn btn-light">
  <i class="fas fa-plus"></i>Create New Project
</button>

</div>
<!---profile cards----->

<div class="profile-card">
    <img src="shikri.jpg" alt="Profile 1">
    <div class="profile-info">
      <h3>Jerry Gerald</h3>
    <p>Project Manager</p>
    <div class="progress-ring">
      <svg class="progress-circle" width = "100"  height = "100"  viewbox = "0 0 100 100">
      <circle class="progress-bg" cx = "50"  cy = "50" r = "45" />
      <circle class="progress-fill" cx = "50"  cy = "50" r = "45" />
      </svg>

      <div class="progress-text">75%</div>
    </div>
    </div>
</div>


</main>






<!---------footer-->

<footer class="footer">
  Copyright@JerrySoftwares
</footer>

</div>
    
</body>

<script src="dash.js"></script>
</html>
